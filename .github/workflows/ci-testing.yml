name: PHP Tests
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build app image
        run: docker compose build app

      - name: Start and wait for test database
        run: docker compose up -d --wait database_test

      - name: Run tests
        run: |
          docker compose run --rm --no-deps \
            --entrypoint "" \
            -e APP_ENV=test \
            app sh -c "composer install --prefer-dist --no-progress --no-interaction && composer run-tests"
